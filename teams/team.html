<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team | BML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body data-page="team" data-auth="required">
  <div id="main-nav"></div>
  <main class="container py-4">
    <div id="team-header" class="mb-4"></div>
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card bg-dark border-secondary shadow-sm p-4">
          <h2 class="h5 text-white mb-3">Roster</h2>
          <div id="team-roster"></div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card bg-dark border-secondary shadow-sm p-4 mb-4">
          <h2 class="h5 text-white mb-3">Financials</h2>
          <div id="team-financials"></div>
        </div>
        <div class="card bg-dark border-secondary shadow-sm p-4">
          <h2 class="h5 text-white mb-3">History</h2>
          <div id="team-history"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="main-footer"></div>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
