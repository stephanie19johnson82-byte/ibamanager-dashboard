<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | BML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body data-page="admin" data-auth="required">
  <div id="main-nav"></div>
  <main class="container py-4">
    <div class="card bg-dark border-secondary shadow-sm mb-4 p-4">
      <div class="row align-items-center justify-content-between">
        <div class="col-md-8">
          <h1 class="h3 text-white mb-2">Admin Control Center</h1>
          <p class="text-secondary mb-0">Manage league configuration, import BBGM exports, update team ownership, awards, sponsors, facilities, and trade rules from one unified panel.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
          <span class="badge bg-primary bg-opacity-10 text-primary py-2 px-3">Commissioner access only</span>
        </div>
      </div>
    </div>
    <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
      <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#league-settings" type="button">League Settings</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#economy" type="button">Economy</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#features" type="button">Features</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#users" type="button">Users</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#teams" type="button">Teams</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#awards" type="button">Awards</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#trade-rules" type="button">Trade Rules</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#facilities" type="button">Facilities</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#sponsors" type="button">Sponsors</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#franchise-prices" type="button">Franchise Prices</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#news" type="button">News</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#import-center" type="button">Import Center</button></li>
    </ul>
    <div class="tab-content text-white" id="adminTabsContent">
      <div class="tab-pane fade show active" id="league-settings"></div>
      <div class="tab-pane fade" id="economy"></div>
      <div class="tab-pane fade" id="features"></div>
      <div class="tab-pane fade" id="users"></div>
      <div class="tab-pane fade" id="teams"></div>
      <div class="tab-pane fade" id="awards"></div>
      <div class="tab-pane fade" id="trade-rules"></div>
      <div class="tab-pane fade" id="facilities"></div>
      <div class="tab-pane fade" id="sponsors"></div>
      <div class="tab-pane fade" id="franchise-prices"></div>
      <div class="tab-pane fade" id="news"></div>
      <div class="tab-pane fade" id="import-center"></div>
    </div>
  </main>
  <div id="main-footer"></div>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
