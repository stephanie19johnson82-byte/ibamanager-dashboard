<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player | BML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body data-page="player" data-auth="required">
  <div id="main-nav"></div>
  <main class="container py-4">
    <div id="player-header" class="mb-4"></div>
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card bg-dark border-secondary shadow-sm p-4 text-center">
          <div class="player-photo rounded-circle bg-secondary mx-auto mb-3" style="width:160px;height:160px;"></div>
          <h2 id="player-name" class="h4 text-white mb-1"></h2>
          <p id="player-meta" class="text-secondary"></p>
          <div id="player-contract" class="text-white-50"></div>
          <div id="player-awards" class="mt-3 text-white-50"></div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card bg-dark border-secondary shadow-sm p-4 mb-4">
          <h2 class="h5 text-white mb-3">Attributes</h2>
          <div id="player-attributes" class="row gy-2"></div>
        </div>
        <div class="card bg-dark border-secondary shadow-sm p-4 mb-4">
          <h2 class="h5 text-white mb-3">Ratings</h2>
          <div id="player-ratings" class="row gy-2"></div>
        </div>
        <div class="card bg-dark border-secondary shadow-sm p-4">
          <h2 class="h5 text-white mb-3">Career Stats</h2>
          <div id="player-stats"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="main-footer"></div>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
